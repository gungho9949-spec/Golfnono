<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golfnono 골프노노</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #0f2211; color: #e8eced; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* 헤더 */
  header { height: 56px; background: #0a1a0c; border-bottom: 1px solid #2d5a30; display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 700; color: #e8eced; }
  header p { font-size: 11px; color: #607d8b; margin-top: 2px; }
  .count-badge { margin-left: auto; background: rgba(74,158,80,.15); color: #4a9e50; border: 1px solid rgba(74,158,80,.3); border-radius: 99px; padding: 2px 10px; font-size: 12px; font-weight: 700; }

  /* 메인 */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* 사이드바 */
  #sidebar { width: 340px; min-width: 340px; background: #1e3f20; border-right: 1px solid #2d5a30; overflow-y: auto; display: flex; flex-direction: column; }
  #sidebar::-webkit-scrollbar { width: 5px; }
  #sidebar::-webkit-scrollbar-thumb { background: #2d5a30; border-radius: 3px; }

  /* 지도 */
  #map { flex: 1; }
  .leaflet-tile { filter: brightness(.82) saturate(.85); }
  .leaflet-container { background: #111; }

  /* 마커 */
  .gmarker { width: 14px; height: 14px; background: #4a9e50; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 0 3px rgba(74,158,80,.3); cursor: pointer; transition: transform .15s; }
  .gmarker:hover, .gmarker.on { background: #c9a84c; box-shadow: 0 0 0 4px rgba(201,168,76,.35); transform: scale(1.5); }

  /* 웰컴 */
  #welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; gap: 12px; }
  #welcome .ico { font-size: 56px; }
  #welcome h2 { font-size: 16px; font-weight: 700; }
  #welcome p { font-size: 13px; color: #607d8b; line-height: 1.7; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
  .chip { background: rgba(74,158,80,.15); color: #4a9e50; border: 1px solid rgba(74,158,80,.25); border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 600; }

  /* 상세 패널 */
  #detail { display: none; flex-direction: column; }

  /* 골프장 헤더 */
  .d-head { padding: 16px; border-bottom: 1px solid #2d5a30; }
  .d-top { display: flex; align-items: flex-start; gap: 12px; }
  .d-icon { font-size: 36px; line-height: 1; }
  .d-info { flex: 1; min-width: 0; }
  .d-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .d-region { font-size: 11px; color: #607d8b; margin-top: 2px; }
  .d-rating { font-size: 12px; color: #c9a84c; margin-top: 4px; }
  .d-temp { font-size: 24px; font-weight: 700; flex-shrink: 0; }
  .d-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .tag { background: rgba(74,158,80,.12); color: #4a9e50; border: 1px solid rgba(74,158,80,.2); border-radius: 99px; padding: 2px 8px; font-size: 11px; }

  /* 탭 */
  .tabs { display: flex; border-bottom: 1px solid #2d5a30; background: rgba(0,0,0,.2); position: sticky; top: 0; z-index: 5; }
  .tab { flex: 1; padding: 10px 4px; font-size: 12px; font-weight: 600; color: #607d8b; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; }
  .tab.on { color: #c9a84c; border-bottom-color: #c9a84c; }
  .tab:hover:not(.on) { color: #b0bec5; }

  /* 패널 공통 */
  .panel { padding: 16px; display: none; }
  .panel.on { display: block; }

  /* 날씨 패널 */
  .w-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .w-main { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .w-big-icon { font-size: 48px; }
  .w-temp-big { font-size: 32px; font-weight: 700; }
  .w-desc { font-size: 13px; color: #b0bec5; margin-top: 2px; }
  .w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .w-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #b0bec5; }
  .windy-btn { display: block; width: 100%; padding: 12px; background: #c9a84c; color: #0f2211; font-weight: 700; font-size: 13px; border: none; border-radius: 10px; cursor: pointer; transition: opacity .2s; }
  .windy-btn:hover { opacity: .88; }

  /* 맛집 패널 */
  .food-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .food-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rank { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .rank-1 { background: #c9a84c; color: #0f2211; }
  .rank-2 { background: #8ca0a8; color: #0f2211; }
  .rank-3 { background: #8c6e3a; color: #fff; }
  .food-name { font-size: 14px; font-weight: 700; }
  .food-meta { font-size: 11px; color: #607d8b; margin-top: 1px; }
  .food-price { margin-left: auto; font-size: 12px; font-weight: 700; color: #c9a84c; flex-shrink: 0; }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; }
  .badge { background: rgba(74,158,80,.12); color: #4a9e50; border: 1px solid rgba(74,158,80,.2); border-radius: 99px; padding: 2px 7px; font-size: 10px; font-weight: 600; }
  .food-note { text-align: center; font-size: 11px; color: #607d8b; margin-top: 4px; }

  /* 모바일 */
  @media (max-width: 767px) {
    #sidebar { display: none; }
    #map { width: 100%; }
    #sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3f20; border-radius: 18px 18px 0 0; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); z-index: 1000; max-height: 82vh; overflow-y: auto; display: block !important; }
    #sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: #4a9e50; border-radius: 2px; margin: 10px auto 0; }
    .sheet-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #607d8b; font-size: 20px; cursor: pointer; }
  }
  @media (min-width: 768px) { #sheet { display: none !important; } }
</style>
</head>
<body>

<header>
  <span style="font-size:26px;">⛳</span>
  <div>
    <h1>Golfnono</h1>
    <p>실시간 날씨 · 맛집</p>
  </div>
  <span class="count-badge" id="cnt">0개</span>
</header>

<div class="main">

  <!-- 사이드바 (데스크톱) -->
  <div id="sidebar">

    <div id="welcome">
      <div class="ico">🗺️</div>
      <h2>골프장을 선택하세요</h2>
      <p>지도의 녹색 마커를 클릭하면<br>날씨와 맛집 정보가 나타납니다.</p>
      <div class="chips">
        <span class="chip">⛅ 날씨</span>
        <span class="chip">🍽️ 맛집 Top3</span>
        <span class="chip">🌬️ Windy</span>
      </div>
    </div>

    <div id="detail">
      <div class="d-head">
        <div class="d-top">
          <div class="d-icon" id="d-icon">⛅</div>
          <div class="d-info">
            <div class="d-name" id="d-name"></div>
            <div class="d-region" id="d-region"></div>
            <div class="d-rating" id="d-rating"></div>
          </div>
          <div class="d-temp" id="d-temp"></div>
        </div>
        <div class="d-tags" id="d-tags"></div>
      </div>

      <div class="tabs">
        <button class="tab on" onclick="tab('weather')" id="t-weather">⛅ 날씨</button>
        <button class="tab" onclick="tab('food')" id="t-food">🍽️ 맛집</button>
      </div>

      <div class="panel on" id="p-weather">
        <div class="w-card">
          <div class="w-main">
            <span class="w-big-icon" id="w-icon"></span>
            <div>
              <div class="w-temp-big" id="w-temp"></div>
              <div class="w-desc" id="w-desc"></div>
            </div>
          </div>
          <div class="w-grid">
            <div class="w-row"><span>💨</span><span id="w-wind"></span></div>
            <div class="w-row"><span>💧</span><span id="w-hum"></span></div>
            <div class="w-row"><span>☀️</span><span id="w-uv"></span></div>
            <div class="w-row"><span>👁</span><span id="w-vis"></span></div>
          </div>
        </div>
        <button class="windy-btn" id="windy-btn">🌬️ Windy 레이더 확인 →</button>
      </div>

      <div class="panel" id="p-food">
        <div id="food-list"></div>
        <p class="food-note">T-map · 카드 빅데이터 기반</p>
      </div>
    </div>
  </div>

  <div id="map"></div>
</div>

<!-- 모바일 바텀시트 -->
<div id="sheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()">✕</button>

  <div class="d-head" style="margin-top:8px;">
    <div class="d-top">
      <div class="d-icon" id="s-icon">⛅</div>
      <div class="d-info">
        <div class="d-name" id="s-name"></div>
        <div class="d-region" id="s-region"></div>
      </div>
      <div class="d-temp" id="s-temp"></div>
    </div>
    <div class="d-tags" id="s-tags"></div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="stab('weather')" id="st-weather">⛅ 날씨</button>
    <button class="tab" onclick="stab('food')" id="st-food">🍽️ 맛집</button>
  </div>

  <div class="panel on" id="sp-weather">
    <div class="w-card">
      <div class="w-main">
        <span class="w-big-icon" id="sw-icon"></span>
        <div>
          <div class="w-temp-big" id="sw-temp"></div>
          <div class="w-desc" id="sw-desc"></div>
        </div>
      </div>
      <div class="w-grid">
        <div class="w-row"><span>💨</span><span id="sw-wind"></span></div>
        <div class="w-row"><span>💧</span><span id="sw-hum"></span></div>
        <div class="w-row"><span>☀️</span><span id="sw-uv"></span></div>
        <div class="w-row"><span>👁</span><span id="sw-vis"></span></div>
      </div>
    </div>
    <button class="windy-btn" id="s-windy-btn">🌬️ Windy 레이더 확인 →</button>
  </div>

  <div class="panel" id="sp-food">
    <div id="s-food-list"></div>
    <p class="food-note">T-map · 카드 빅데이터 기반</p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 데이터 ──────────────────────────────────────────────────────
const COURSES = [
  {
    id: 'nambu', name: '남부 컨트리클럽', region: '경기도 용인시',
    lat: 37.2403, lng: 127.1944, holes: 36, type: '퍼블릭', rating: 4.8,
    tags: ['36홀', '퍼블릭', '챔피언십'],
    weather: { icon:'⛅', temp:23, desc:'구름 조금', wind:'북서 4m/s', hum:'52%', uv:'UV 5 (보통)', vis:'20km' },
    restaurants: [
      { rank:1, emoji:'🥩', name:'용인왕갈비',    cat:'한식·갈비',   dist:'1.2km', price:'35,000원~', badges:['T-map 1위','13-15시 42%','주차 완비'] },
      { rank:2, emoji:'🌿', name:'미나리 두부마을', cat:'한식·두부',   dist:'2.1km', price:'18,000원~', badges:['카드결제 급증','줄서는 맛집','예약 가능'] },
      { rank:3, emoji:'🍜', name:'우리손칼국수',   cat:'분식·칼국수', dist:'0.8km', price:'12,000원~', badges:['가성비 1위','대기 없음','단체석'] },
    ],
  },
  {
    id: 'gapyeong', name: '가평 베네스트 GC', region: '경기도 가평군',
    lat: 37.8142, lng: 127.5110, holes: 18, type: '프라이빗', rating: 4.9,
    tags: ['18홀', '프라이빗', '산악코스'],
    weather: { icon:'🌤', temp:19, desc:'맑음', wind:'동 2m/s', hum:'45%', uv:'UV 4 (보통)', vis:'25km' },
    restaurants: [
      { rank:1, emoji:'🫘', name:'가평잣두부마을', cat:'한식·두부',   dist:'2.3km', price:'22,000원~', badges:['T-map 1위','13-15시 38%','주차 완비'] },
      { rank:2, emoji:'🍗', name:'산골닭갈비',    cat:'한식·닭갈비', dist:'1.5km', price:'16,000원~', badges:['블로거 추천','웨이팅 있음','예약 불가'] },
      { rank:3, emoji:'🍝', name:'남이섬 막국수',  cat:'분식·막국수', dist:'3.0km', price:'14,000원~', badges:['관광객 픽','대기 10분','경치 좋음'] },
    ],
  },
  {
    id: 'wellington', name: '웰링턴 CC', region: '경기도 광주시',
    lat: 37.4072, lng: 127.3421, holes: 27, type: '프라이빗', rating: 4.7,
    tags: ['27홀', '프라이빗', '구릉코스'],
    weather: { icon:'🌧', temp:17, desc:'비', wind:'남서 6m/s', hum:'82%', uv:'UV 1 (낮음)', vis:'8km' },
    restaurants: [
      { rank:1, emoji:'🥩', name:'광주 한우명가',   cat:'한식·한우',   dist:'1.8km', price:'65,000원~', badges:['T-map 1위','13-15시 51%','발렛 가능'] },
      { rank:2, emoji:'🍲', name:'초월 순두부찌개', cat:'한식·두부',   dist:'0.9km', price:'10,000원~', badges:['로컬 맛집','대기 없음','단체 가능'] },
      { rank:3, emoji:'🍗', name:'양평 물닭갈비',   cat:'한식·닭갈비', dist:'4.2km', price:'20,000원~', badges:['SNS 핫플','예약 필수','드라이브코스'] },
    ],
  },
  {
    id: 'trinity', name: '트리니티 클럽', region: '강원도 홍천군',
    lat: 37.6693, lng: 127.9124, holes: 18, type: '프라이빗', rating: 4.8,
    tags: ['18홀', '프라이빗', '리조트형'],
    weather: { icon:'🌥', temp:15, desc:'흐림', wind:'북동 3m/s', hum:'68%', uv:'UV 2 (낮음)', vis:'15km' },
    restaurants: [
      { rank:1, emoji:'🥩', name:'홍천 한우 직판장', cat:'한식·한우',   dist:'5.0km', price:'45,000원~', badges:['T-map 1위','13-15시 47%','주차 완비'] },
      { rank:2, emoji:'🍜', name:'강원 메밀국수',    cat:'분식·국수',   dist:'2.7km', price:'11,000원~', badges:['강원 향토음식','대기 없음','포장 가능'] },
      { rank:3, emoji:'🍗', name:'홍천 닭갈비 골목', cat:'한식·닭갈비', dist:'4.8km', price:'15,000원~', badges:['현지인 1위','단체 예약','단체석'] },
    ],
  },
  {
    id: 'trius', name: '트리우스 골프클럽', region: '인천광역시 영종도',
    lat: 37.4844, lng: 126.4830, holes: 18, type: '퍼블릭', rating: 4.6,
    tags: ['18홀', '퍼블릭', '해변코스'],
    weather: { icon:'🌊', temp:21, desc:'흐리고 바람', wind:'서 8m/s', hum:'74%', uv:'UV 3 (보통)', vis:'12km' },
    restaurants: [
      { rank:1, emoji:'🐟', name:'영종 활어회 센터', cat:'해산물·회',  dist:'3.1km', price:'55,000원~', badges:['T-map 1위','13-15시 35%','주차 완비'] },
      { rank:2, emoji:'🦐', name:'을왕리 해물찜',   cat:'해산물·찜',  dist:'4.0km', price:'40,000원~', badges:['SNS 핫플','예약 권장','오션뷰'] },
      { rank:3, emoji:'🦪', name:'영종 조개구이',   cat:'해산물·조개', dist:'2.5km', price:'30,000원~', badges:['로컬 1위','대기 15분','야외 테이블'] },
    ],
  },
];

// ── 지도 ────────────────────────────────────────────────────────
const map = L.map('map', { center: [36.8, 127.6], zoom: 7 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 19
}).addTo(map);

// ── 마커 ────────────────────────────────────────────────────────
let activeEl = null;
document.getElementById('cnt').textContent = COURSES.length + '개';

COURSES.forEach(c => {
  const el = document.createElement('div');
  el.className = 'gmarker';
  el.title = c.name;
  L.marker([c.lat, c.lng], {
    icon: L.divIcon({ className: '', html: el, iconSize: [14, 14], iconAnchor: [7, 7] })
  }).addTo(map).on('click', () => select(c, el));
});

// ── 선택 ────────────────────────────────────────────────────────
function select(c, el) {
  if (activeEl) activeEl.classList.remove('on');
  activeEl = el;
  el.classList.add('on');
  map.panTo([c.lat, c.lng]);

  if (window.innerWidth < 768) {
    fillSheet(c);
    document.getElementById('sheet').classList.add('open');
  } else {
    fillDetail(c);
  }
}

// ── 사이드바 채우기 ─────────────────────────────────────────────
function fillDetail(c) {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('detail').style.display = 'flex';

  document.getElementById('d-icon').textContent = c.weather.icon;
  document.getElementById('d-name').textContent = c.name;
  document.getElementById('d-region').textContent = c.region;
  document.getElementById('d-rating').textContent = '★'.repeat(Math.round(c.rating)) + '  ' + c.rating.toFixed(1);
  document.getElementById('d-temp').textContent = c.weather.temp + '°C';
  document.getElementById('d-tags').innerHTML = c.tags.map(t => `<span class="tag">${t}</span>`).join('');

  fillWeather('w', c);
  fillFood('food-list', c);
  tab('weather');

  document.getElementById('windy-btn').onclick = () =>
    window.open(`https://www.windy.com/?${c.lat},${c.lng},11`, '_blank');
}

function fillSheet(c) {
  document.getElementById('s-icon').textContent = c.weather.icon;
  document.getElementById('s-name').textContent = c.name;
  document.getElementById('s-region').textContent = c.region;
  document.getElementById('s-temp').textContent = c.weather.temp + '°C';
  document.getElementById('s-tags').innerHTML = c.tags.map(t => `<span class="tag">${t}</span>`).join('');

  fillWeather('sw', c);
  fillFood('s-food-list', c);
  stab('weather');

  document.getElementById('s-windy-btn').onclick = () =>
    window.open(`https://www.windy.com/?${c.lat},${c.lng},11`, '_blank');
}

function fillWeather(prefix, c) {
  const w = c.weather;
  document.getElementById(prefix + '-icon').textContent = w.icon;
  document.getElementById(prefix + '-temp').textContent = w.temp + '°C';
  document.getElementById(prefix + '-desc').textContent = w.desc;
  document.getElementById(prefix + '-wind').textContent = w.wind;
  document.getElementById(prefix + '-hum').textContent = w.hum;
  document.getElementById(prefix + '-uv').textContent = w.uv;
  document.getElementById(prefix + '-vis').textContent = '시야 ' + w.vis;
}

function fillFood(listId, c) {
  document.getElementById(listId).innerHTML = c.restaurants.map(r => `
    <div class="food-card">
      <div class="food-top">
        <div class="rank rank-${r.rank}">${r.rank}</div>
        <div>
          <div class="food-name">${r.emoji} ${r.name}</div>
          <div class="food-meta">${r.cat} · ${r.dist}</div>
        </div>
        <div class="food-price">${r.price}</div>
      </div>
      <div class="badges">${r.badges.map(b => `<span class="badge">${b}</span>`).join('')}</div>
    </div>
  `).join('');
}

// ── 탭 전환 ─────────────────────────────────────────────────────
function tab(id) {
  ['weather', 'food'].forEach(t => {
    document.getElementById('t-' + t).classList.toggle('on', t === id);
    document.getElementById('p-' + t).classList.toggle('on', t === id);
  });
}
function stab(id) {
  ['weather', 'food'].forEach(t => {
    document.getElementById('st-' + t).classList.toggle('on', t === id);
    document.getElementById('sp-' + t).classList.toggle('on', t === id);
  });
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
}
</script>
