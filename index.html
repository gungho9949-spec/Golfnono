<!-- 카카오맵 도메인: https://golfnono-kr.vercel.app -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golfnono 골프노노</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f4f6f8; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* 헤더 */
header {
  height: 56px; background: #fff; border-bottom: 1px solid #e5e7eb;
  display: flex; align-items: center; padding: 0 20px; gap: 10px;
  flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.logo-icon { font-size: 24px; }
.logo-text { font-size: 18px; font-weight: 700; color: #1a1a1a; }
.logo-sub { font-size: 11px; color: #9ca3af; margin-top: 1px; }
.count-badge {
  margin-left: auto; background: #f0fdf4; color: #16a34a;
  border: 1px solid #bbf7d0; border-radius: 99px;
  padding: 3px 12px; font-size: 12px; font-weight: 600;
}

/* 메인 */
.main { display: flex; flex: 1; overflow: hidden; }

/* 사이드바 */
#sidebar {
  width: 340px; min-width: 340px; background: #fff;
  border-right: 1px solid #e5e7eb; overflow-y: auto;
  box-shadow: 2px 0 8px rgba(0,0,0,.04);
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

/* 지도 */
#map { flex: 1; }


/* 마커 */
.gmarker {
  width: 14px; height: 14px; background: #22c55e;
  border: 2.5px solid #fff; border-radius: 50%;
  box-shadow: 0 2px 6px rgba(34,197,94,.4);
  cursor: pointer; transition: transform .15s;
}
.gmarker:hover, .gmarker.on {
  background: #16a34a; transform: scale(1.5);
  box-shadow: 0 3px 10px rgba(22,163,74,.5);
}

/* 웰컴 */
#welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; padding: 32px 24px;
  text-align: center; gap: 10px;
}
#welcome .ico { font-size: 52px; }
#welcome h2 { font-size: 16px; font-weight: 700; color: #1a1a1a; }
#welcome p { font-size: 13px; color: #6b7280; line-height: 1.75; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 6px; }
.chip {
  background: #f0fdf4; color: #16a34a;
  border: 1px solid #bbf7d0; border-radius: 99px;
  padding: 4px 12px; font-size: 11px; font-weight: 600;
}

/* 상세 패널 */
#detail { display: none; flex-direction: column; }

/* 골프장 헤더 */
.d-head { padding: 16px 16px 14px; border-bottom: 1px solid #f3f4f6; }
.d-top { display: flex; align-items: flex-start; gap: 12px; }
.d-icon { font-size: 34px; line-height: 1; }
.d-info { flex: 1; min-width: 0; }
.d-name { font-size: 16px; font-weight: 700; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-region { font-size: 12px; color: #9ca3af; margin-top: 3px; }
.d-rating { font-size: 12px; color: #f59e0b; margin-top: 4px; font-weight: 600; }
.d-temp { font-size: 26px; font-weight: 700; color: #1a1a1a; flex-shrink: 0; }
.d-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.tag {
  background: #f9fafb; color: #374151;
  border: 1px solid #e5e7eb; border-radius: 6px;
  padding: 2px 8px; font-size: 11px; font-weight: 500;
}

/* 탭 */
.tabs {
  display: flex; border-bottom: 1px solid #e5e7eb;
  background: #fff; position: sticky; top: 0; z-index: 5;
}
.tab {
  flex: 1; padding: 11px 4px; font-size: 13px; font-weight: 600;
  color: #9ca3af; background: none; border: none;
  border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s;
}
.tab.on { color: #22c55e; border-bottom-color: #22c55e; }
.tab:hover:not(.on) { color: #374151; }

/* 패널 */
.panel { padding: 16px; display: none; }
.panel.on { display: block; }

/* 날씨 */
.w-card {
  background: #f9fafb; border: 1px solid #e5e7eb;
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.w-main { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.w-big-icon { font-size: 46px; line-height: 1; }
.w-temp-big { font-size: 32px; font-weight: 700; color: #1a1a1a; }
.w-desc { font-size: 13px; color: #6b7280; margin-top: 3px; }
.w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.w-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #4b5563; }
.windy-btn {
  display: block; width: 100%; padding: 12px;
  background: #22c55e; color: #fff; font-weight: 700; font-size: 13px;
  border: none; border-radius: 10px; cursor: pointer; transition: background .2s;
}
.windy-btn:hover { background: #16a34a; }

/* 맛집 */
.food-card {
  background: #fff; border: 1px solid #e5e7eb;
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.food-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rank {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.rank-1 { background: #fef3c7; color: #92400e; }
.rank-2 { background: #f3f4f6; color: #374151; }
.rank-3 { background: #fdf2f8; color: #7c3aed; }
.food-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }
.food-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.food-price { margin-left: auto; font-size: 12px; font-weight: 700; color: #22c55e; flex-shrink: 0; }
.badges { display: flex; flex-wrap: wrap; gap: 4px; }
.badge {
  background: #f0fdf4; color: #16a34a;
  border: 1px solid #bbf7d0; border-radius: 99px;
  padding: 2px 8px; font-size: 10px; font-weight: 600;
}
.food-note { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 2px; }

/* CCTV 버튼 */
.cctv-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 15px 16px; margin-bottom: 10px;
  border: none; border-radius: 12px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
  text-align: left; transition: opacity .2s, transform .1s;
}
.cctv-btn:hover { opacity: .88; }
.cctv-btn:active { transform: scale(.98); }
.cctv-btn-primary { background: #22c55e; color: #fff; }
.cctv-btn-secondary { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }
.cctv-btn-icon { font-size: 20px; flex-shrink: 0; }
.cctv-btn-text { display: flex; flex-direction: column; gap: 2px; }
.cctv-btn-sub { font-size: 11px; font-weight: 400; opacity: .8; }
.mini-weather { display: flex; gap: 8px; margin-top: 16px; }
.mini-chip {
  flex: 1; background: #f9fafb; border: 1px solid #e5e7eb;
  border-radius: 10px; padding: 10px 8px; text-align: center;
}
.mini-chip-icon { font-size: 18px; margin-bottom: 4px; }
.mini-chip-val { font-size: 12px; color: #4b5563; font-weight: 500; }

/* 모바일 */
@media (max-width: 767px) {
  #sidebar { display: none; }
  #map { width: 100%; }
  #sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-radius: 20px 20px 0 0;
    transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    z-index: 1000; max-height: 82vh; overflow-y: auto;
    box-shadow: 0 -4px 24px rgba(0,0,0,.1);
    display: block !important;
  }
  #sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: #d1d5db; border-radius: 2px; margin: 10px auto 0; }
  .sheet-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #9ca3af; font-size: 20px; cursor: pointer; }
}
@media (min-width: 768px) { #sheet { display: none !important; } }
</style>
</head>

// 지도 (카카오맵 우선, 실패 시 Leaflet 폴백)
let mapInst, useKakao = false, activeEl = null, activeMarker = null;
let normalImg, activeImg;

function initMap(kakaoOk) {
  useKakao = kakaoOk;
  document.getElementById('cnt').textContent = COURSES.length + '개';

  if (useKakao) {
    mapInst = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(36.2, 127.8),
      level: 7
    });
    const mkSvg = (fill, size) =>
      'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${fill}" stroke="#fff" stroke-width="2"/></svg>`
      );
    normalImg = new kakao.maps.MarkerImage(mkSvg('#22c55e',16), new kakao.maps.Size(16,16), { offset: new kakao.maps.Point(8,8) });
    activeImg  = new kakao.maps.MarkerImage(mkSvg('#16a34a',22), new kakao.maps.Size(22,22), { offset: new kakao.maps.Point(11,11) });
    COURSES.forEach(c => {
      const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(c.lat, c.lng), map: mapInst, image: normalImg, title: c.name });
      kakao.maps.event.addListener(marker, 'click', () => select(c, marker));
    });
  } else {
    mapInst = L.map('map', { center: [36.2, 127.8], zoom: 7 });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO', subdomains: 'abcd', maxZoom: 19
    }).addTo(mapInst);
    COURSES.forEach(c => {
      const el = document.createElement('div');
      el.className = 'gmarker'; el.title = c.name;
      L.marker([c.lat, c.lng], {
        icon: L.divIcon({ className: '', html: el, iconSize: [14,14], iconAnchor: [7,7] })
      }).addTo(mapInst).on('click', () => select(c, el));
    });
  }
}

// 카카오 SDK 동적 로드 → 실패 시 Leaflet 폴백
(function() {
  const s = document.createElement('script');
  s.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=28bac2696bc8d416ce3d2f349581838e&autoload=false';
  s.onload = () => { try { kakao.maps.load(() => initMap(true)); } catch(e) { initMap(false); } };
  s.onerror = () => initMap(false);
  document.head.appendChild(s);
})();

const OWM_KEY = '9c92595dbd15ee90bf34815883c7da8c';

const WIND_DIR = ['북','북북동','북동','동북동','동','동남동','남동','남남동','남','남남서','남서','서남서','서','서북서','북서','북북서'];
function windDir(deg) { return WIND_DIR[Math.round(deg / 22.5) % 16]; }

const OWM_ICON = {
  '01d':'☀️','01n':'🌙','02d':'🌤','02n':'🌤','03d':'⛅','03n':'⛅',
  '04d':'☁️','04n':'☁️','09d':'🌧','09n':'🌧','10d':'🌦','10n':'🌧',
  '11d':'⛈','11n':'⛈','13d':'🌨','13n':'🌨','50d':'🌫','50n':'🌫',
};

async function fetchWeather(c) {
  try {
    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${c.lat}&lon=${c.lng}&appid=${OWM_KEY}&lang=kr&units=metric`;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 5000);
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error();
    const d = await res.json();
    return {
      icon: OWM_ICON[d.weather[0].icon] || '⛅',
      temp: Math.round(d.main.temp),
      desc: d.weather[0].description,
      wind: `${windDir(d.wind.deg)} ${Math.round(d.wind.speed)}m/s`,
      hum: d.main.humidity + '%',
      uv: '–',
      vis: Math.round((d.visibility || 10000) / 1000) + 'km',
    };
  } catch {
    return c.weather;
  }
}

async function select(c, markerOrEl) {
  if (useKakao) {
    if (activeMarker) activeMarker.setImage(normalImg);
    activeMarker = markerOrEl;
    markerOrEl.setImage(activeImg);
    mapInst.setCenter(new kakao.maps.LatLng(c.lat, c.lng));
  } else {
    if (activeEl) activeEl.classList.remove('on');
    activeEl = markerOrEl;
    markerOrEl.classList.add('on');
    mapInst.panTo([c.lat, c.lng]);
  }
  const weather = await fetchWeather(c);
  const course = { ...c, weather };
  if (window.innerWidth < 768) {
    fillSheet(course);
    document.getElementById('sheet').classList.add('open');
  } else {
    fillDetail(course);
  }
}

function fillDetail(c) {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('detail').style.display = 'flex';
  document.getElementById('d-icon').textContent = c.weather.icon;
  document.getElementById('d-name').textContent = c.name;
  document.getElementById('d-region').textContent = c.region;
  document.getElementById('d-rating').textContent = '★'.repeat(Math.round(c.rating)) + '  ' + c.rating.toFixed(1);
  document.getElementById('d-temp').textContent = c.weather.temp + '°C';
  document.getElementById('d-tags').innerHTML = c.tags.map(t => `<span class="tag">${t}</span>`).join('');
  fillWeather('w', c);
  fillFood('food-list', c);
  fillCctv('mc', 'naver-map-btn', c);
  tab('cctv');
  document.getElementById('windy-btn').onclick = () =>
    window.open(`https://www.windy.com/?${c.lat},${c.lng},11`, '_blank');
}

function fillSheet(c) {
  document.getElementById('s-icon').textContent = c.weather.icon;
  document.getElementById('s-name').textContent = c.name;
  document.getElementById('s-region').textContent = c.region;
  document.getElementById('s-temp').textContent = c.weather.temp + '°C';
  document.getElementById('s-tags').innerHTML = c.tags.map(t => `<span class="tag">${t}</span>`).join('');
  fillWeather('sw', c);
  fillFood('s-food-list', c);
  fillCctv('smc', 's-naver-map-btn', c);
  stab('cctv');
  document.getElementById('s-windy-btn').onclick = () =>
    window.open(`https://www.windy.com/?${c.lat},${c.lng},11`, '_blank');
}

function fillCctv(prefix, btnId, c) {
  document.getElementById(prefix+'-icon').textContent = c.weather.icon;
  document.getElementById(prefix+'-desc').textContent = c.weather.desc;
  document.getElementById(prefix+'-wind').textContent = c.weather.wind;
  document.getElementById(prefix+'-hum').textContent = c.weather.hum;
  document.getElementById(btnId).onclick = () =>
    window.open(`https://map.naver.com/v5/?c=${c.lng},${c.lat},15,0,0,0,dh`, '_blank');
}

function fillWeather(p, c) {
  const w = c.weather;
  document.getElementById(p+'-icon').textContent = w.icon;
  document.getElementById(p+'-temp').textContent = w.temp + '°C';
  document.getElementById(p+'-desc').textContent = w.desc;
  document.getElementById(p+'-wind').textContent = w.wind;
  document.getElementById(p+'-hum').textContent = w.hum;
  document.getElementById(p+'-uv').textContent = w.uv;
  document.getElementById(p+'-vis').textContent = '시야 ' + w.vis;
}

function fillFood(listId, c) {
  document.getElementById(listId).innerHTML = c.restaurants.map(r => {
    const url = `https://search.naver.com/search.naver?query=${encodeURIComponent(r.name + ' ' + c.region)}`;
    return `
    <div class="food-card" onclick="window.open('${url}','_blank')" style="cursor:pointer;">
      <div class="food-top">
        <div class="rank rank-${r.rank}">${r.rank}</div>
        <div>
          <div class="food-name">${r.emoji} ${r.name}</div>
          <div class="food-meta">${r.cat} · ${r.dist}</div>
        </div>
        <div class="food-price">${r.price}</div>
      </div>
      <div class="badges">${r.badges.map(b => `<span class="badge">${b}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function tab(id) {
  ['cctv','weather','food'].forEach(t => {
    document.getElementById('t-'+t).classList.toggle('on', t===id);
    document.getElementById('p-'+t).classList.toggle('on', t===id);
  });
}
function stab(id) {
  ['cctv','weather','food'].forEach(t => {
    document.getElementById('st-'+t).classList.toggle('on', t===id);
    document.getElementById('sp-'+t).classList.toggle('on', t===id);
  });
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
}
</script>
